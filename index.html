<!doctype html>
<html lang="es" class="bg-slate-200 dark:bg-slate-950">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portafolio de Carlos Araujo Galván — Desarrollador Web Full Stack & Diseñador UX/UI. React, Angular, TypeScript, Node.js, Java y PHP." />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#e2e8f0" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Portafolio - Carlos Araujo Galván" />
  <meta property="og:description" content="Desarrollador Web Full Stack & Diseñador UX/UI. React, Angular, TypeScript, Node.js, Java y PHP." />
  <meta property="og:image" content="/assets/images/me/profile.png" />
  <meta name="twitter:card" content="summary" />
  <title>Portafolio - Carlos Araujo Galván</title>
  <script>
    (() => {
      let dark;
      try {
        const stored = localStorage.getItem('dark-mode');
        dark = stored === 'true' || (stored === null && matchMedia('(prefers-color-scheme: dark)').matches);
      } catch {
        dark = matchMedia('(prefers-color-scheme: dark)').matches;
      }
      document.documentElement.classList.toggle('dark', dark);
      document.documentElement.style.backgroundColor = dark ? '#020617' : '#e2e8f0';
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
